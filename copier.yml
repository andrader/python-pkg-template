_subdirectory: template

project_name:
  type: str
  help: "What is the name of your project?"
  default: "my-python-project"

package_name:
  type: str
  help: "What is the name of the python package?"
  default: "{{ project_name|lower|replace('-', '_')|replace(' ', '_') }}"

project_description:
  type: str
  help: "What does this project do?"
  default: "A reusable Python package."

author_name:
  type: str
  help: "What is the author's name?"
  default: "Your Name"

author_email:
  type: str
  help: "What is the author's email?"
  default: "your.email@example.com"

github_username:
  type: str
  help: "What is your GitHub username?"
  default: "username"

include_docs:
  type: bool
  help: "Include MkDocs documentation setup?"
  default: true

include_ty:
  type: bool
  help: "Include 'ty' type checker?"
  default: true

include_semantic_release:
  type: bool
  help: "Include Python Semantic Release?"
  default: true

include_workflows:
  type: bool
  help: "Include GitHub Actions workflows?"
  default: true

include_cli:
  type: bool
  help: "Include a CLI entry point?"
  default: true
